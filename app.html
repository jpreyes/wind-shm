  <!-- Captura temprana del evento de instalación PWA (puede dispararse antes
       de que el resto de scripts se ejecute). -->
  <script>
    // Tema: claro por defecto; aplica el guardado antes de pintar (sin flash).
    try { document.documentElement.dataset.theme = localStorage.getItem('rewind_theme') || localStorage.getItem('portico_theme') || 'light'; } catch (e) {}
    window.__pwaInstall = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.__pwaInstall = e;
      window.dispatchEvent(new Event('pwa-installable'));
    });
    window.addEventListener('appinstalled', function () {
      window.__pwaInstall = null;
      window.dispatchEvent(new Event('pwa-installed'));
    });
  </script>

<script>
/* Portada = pantalla de carga. shm_mode.js maneja el progreso y la cierra al
   terminar. Aquí sólo dejamos el cierre + un fallback por si la carga fallara. */
window.__rewindCloseLanding = function () {
  const l = document.getElementById('landing'); if (!l || l.classList.contains('exit')) return;
  l.classList.add('exit'); setTimeout(function () { l.remove(); }, 700);
};
setTimeout(function () { window.__rewindCloseLanding(); }, 25000);   // fallback de seguridad
</script>

</div>

<!-- Leaflet (vista 2D del parque en ReWind) — global window.L, antes de los módulos -->
<script src="lib/leaflet/leaflet.js?v=282"></script>
<!-- Toggle de tema (claro/oscuro). ReWind lo cablea aquí. -->
<script>
  (function () {
    function toggle() {
      var d = document.documentElement, next = d.dataset.theme === 'dark' ? 'light' : 'dark';
      d.dataset.theme = next; try { localStorage.setItem('rewind_theme', next); } catch (e) {}
    }
    addEventListener('DOMContentLoaded', function () {
      ['btn-theme', 'landing-theme'].forEach(function (id) {
        var b = document.getElementById(id); if (b) b.addEventListener('click', toggle);
      });
    });
  })();
</script>
<!-- ReWind: SHM de torres eólicas (se auto-bootea sobre el shell) -->
<script type="module" src="js/shm/shm_mode.js?v=282"></script>

<!-- PWA: registrar el service worker (offline). Solo en contexto seguro
     (https o localhost); el navegador deja navigator.serviceWorker undefined
     en orígenes inseguros, así que el guard lo cubre. -->
<script>
// No registrar bajo automatización (navigator.webdriver) para no interferir
// con herramientas de prueba/preview. En uso normal el SW se registra siempre.
if ('serviceWorker' in navigator && !navigator.webdriver) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err =>
      console.warn('No se pudo registrar el service worker:', err));
  });
}
</script>

<!-- P2-7: Styled tooltip engine — replaces native browser title tooltips -->
<div id="sw-tooltip"></div>
<script>
(function() {
  const tip = document.getElementById('sw-tooltip');
  let hideTimer = null;

  function formatText(raw) {
    // Split "Label  Shortcut" (2+ spaces) to render shortcut as key badge
    const m = raw.match(/^(.*?)\s{2,}(\S.*)$/);
    if (m) {
      return m[1].trim() + ' <span class="sw-tip-key">' + m[2].trim() + '</span>';
    }
    return raw;
  }

  function show(el, e) {
    clearTimeout(hideTimer);
    const text = el._swTip;
    if (!text) return;
    tip.innerHTML = formatText(text);
    tip.classList.add('visible');
    reposition(e);
  }

  function reposition(e) {
    const margin = 12;
    const tw = tip.offsetWidth  || 180;
    const th = tip.offsetHeight || 28;
    let x = e.clientX + 14;
    let y = e.clientY + 18;
    if (x + tw + margin > window.innerWidth)  x = e.clientX - tw - 8;
    if (y + th + margin > window.innerHeight) y = e.clientY - th - 8;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }

  function hide() {
    hideTimer = setTimeout(function() { tip.classList.remove('visible'); }, 60);
  }

  // First mouseover: strip native title, store as _swTip, mark element
  document.addEventListener('mouseover', function(e) {
    const el = e.target.closest('[title]');
    if (!el) return;
    el._swTip = el.getAttribute('title');
    el.removeAttribute('title');
    el.setAttribute('data-sw-tipped', '1');
    show(el, e);
  }, true);

  // Subsequent hovers on already-converted elements
  document.addEventListener('mouseover', function(e) {
    const el = e.target.closest('[data-sw-tipped]');
    if (el) show(el, e);
  });

  document.addEventListener('mousemove', function(e) {
    if (tip.classList.contains('visible')) reposition(e);
  });

  document.addEventListener('mouseout', function(e) {
    if (e.target.closest('[data-sw-tipped],[title]')) hide();
  });

  document.addEventListener('mousedown', function() {
    tip.classList.remove('visible');
  });
})();
</script>
