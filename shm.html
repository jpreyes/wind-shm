<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wind-shm — Parque eólico (visual)</title>
  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three/three.module.js",
      "three/addons/": "./lib/three/addons/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #scene { position: fixed; inset: 0; }
    .bar {
      position: fixed; top: 14px; left: 14px; z-index: 10;
      display: flex; align-items: center; gap: 10px;
      background: rgba(20,28,38,0.78); color: #eef3f8; backdrop-filter: blur(6px);
      padding: 10px 14px; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    }
    .bar h1 { font-size: 14px; font-weight: 600; letter-spacing: .3px; }
    .bar .muted { color: #9fb0c2; font-size: 12px; }
    button {
      font: inherit; font-size: 13px; cursor: pointer; border: 0; border-radius: 9px;
      padding: 8px 12px; background: #2f7df6; color: #fff; transition: background .15s;
    }
    button:hover { background: #1f6ae0; }
    button.ghost { background: rgba(255,255,255,0.12); }
    button.ghost:hover { background: rgba(255,255,255,0.2); }
    #info {
      position: fixed; top: 14px; right: 14px; z-index: 10; min-width: 200px;
      background: rgba(20,28,38,0.78); color: #eef3f8; backdrop-filter: blur(6px);
      padding: 12px 14px; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      font-size: 13px; display: none;
    }
    #info b { color: #6fe3a6; }
    #info .row { display: flex; justify-content: space-between; gap: 16px; margin-top: 6px; color: #cdd9e6; }
    .hint { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
      color: #2a3a48; font-size: 12px; background: rgba(255,255,255,0.6); padding: 5px 12px; border-radius: 20px; }
  </style>
</head>
<body>
  <div id="scene"></div>
  <div class="bar">
    <h1>🌬️ Parque eólico</h1>
    <span class="muted">Torres: <b id="count">0</b></span>
    <button id="add">➕ Agregar torre</button>
    <button class="ghost" id="clear">Vista general</button>
  </div>
  <div id="info">
    <div><b id="i-id">—</b></div>
    <div class="row"><span>Rotor</span><span id="i-rpm">— rpm</span></div>
    <div class="row"><span>Sensores</span><span>2 MEMS · activos</span></div>
    <div class="row"><span>Gateway</span><span style="color:#6fe3a6">● en línea</span></div>
    <div class="row muted" style="margin-top:8px;font-size:11px">El dashboard SHM completo va aquí</div>
  </div>
  <div class="hint">Clic en una torre para acercar · arrastrar para orbitar · rueda para zoom</div>

  <script type="module">
    import { FleetView } from './js/shm/fleet_view.js?v=199';

    const fleet = new FleetView(document.getElementById('scene'));
    const $ = id => document.getElementById(id);

    fleet.onChange = n => { $('count').textContent = n; };
    fleet.onSelect = t => {
      const info = $('info');
      if (!t) { info.style.display = 'none'; return; }
      info.style.display = 'block';
      $('i-id').textContent = t.id;
      $('i-rpm').textContent = (t.spin * 60 / (2 * Math.PI)).toFixed(1) + ' rpm';
    };

    // 10 torres por defecto para probar todo.
    for (let i = 0; i < 10; i++) fleet.addTurbine();

    $('add').onclick = () => fleet.addTurbine();
    $('clear').onclick = () => fleet.clearSelection();
  </script>
</body>
</html>
